# Default stack: simple local run with mock auth and the sample photos.
#
#   docker compose up        # → http://localhost:8099, logged in as a mock admin
#
# No Plex server needed. To test the real Plex integration instead, see
# docker-compose.plex.yml. For production, build a release artifact with
# `make release` and deploy it on any Docker host (see README).
services:
  plex-photos:
    image: plex-photos:latest
    container_name: plex-photos
    build: .
    ports:
      - "8099:8099"
    environment:
      AUTH_PROVIDER: mock
      MOCK_USER: dev
      MOCK_ADMIN: "true"
    volumes:
      - ./testdata/photos:/photos:ro   # sample photos (read-only)
      - plex-photos-data:/config       # SQLite + thumbnail cache

volumes:
  plex-photos-data:
