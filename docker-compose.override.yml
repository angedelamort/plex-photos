# Local testing override (auto-merged by `docker compose`).
# Adapts the production compose file for a local mock-auth run:
#   - mock auth instead of Plex SSO
#   - mounts ./testdata/photos instead of the NAS path
#   - default container user + no external network
# Do NOT use this in production.
services:
  plex-photos:
    networks: !reset []
    environment:
      # Local run: entrypoint (root) chowns /config to this user then drops to it.
      PUID: "65534"
      PGID: "65534"
      AUTH_PROVIDER: mock
      MOCK_USER: dev
      MOCK_ADMIN: "true"
    volumes:
      - ./testdata/photos:/photos:ro

networks:
  media:
    external: false
